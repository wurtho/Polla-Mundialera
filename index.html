<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Polla Mundial 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;font-size:15px;}
.screen{display:none;min-height:100vh;}
.screen.active{display:block;}
#screen-login{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f5f5f0;}
.login-box{background:#fff;border-radius:16px;border:1px solid #e8e5dc;padding:2.5rem 2rem;max-width:380px;width:90%;text-align:center;box-shadow:0 2px 20px rgba(0,0,0,0.06);}
.login-logo{font-size:48px;margin-bottom:1rem;}
.login-title{font-size:22px;font-weight:500;margin-bottom:.25rem;}
.login-sub{font-size:14px;color:#888;margin-bottom:2rem;}
.btn-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px;border-radius:10px;border:1px solid #e0ddd6;background:#fff;cursor:pointer;font-size:15px;font-weight:500;color:#1a1a1a;transition:background .15s;}
.btn-google:hover{background:#f5f5f0;}
.btn-google:active{background:#ebebeb;}
.login-error{margin-top:1rem;font-size:13px;color:#e24b4a;display:none;}
.app{max-width:680px;margin:0 auto;padding:1rem;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:.75rem 0 1.25rem;}
.topbar-title{font-size:18px;font-weight:500;}
.avatar{width:34px;height:34px;border-radius:50%;object-fit:cover;cursor:pointer;border:1px solid #e0ddd6;}
.avatar-placeholder{width:34px;height:34px;border-radius:50%;background:#e6f1fb;color:#0c447c;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;cursor:pointer;}
.tab-bar{display:flex;gap:4px;border-bottom:1px solid #e8e5dc;margin-bottom:1.25rem;overflow-x:auto;}
.tab{padding:8px 14px;font-size:13px;cursor:pointer;border:none;background:none;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:500;}
.card{background:#fff;border:1px solid #e8e5dc;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem;}
.section-title{font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;}
.notice{font-size:13px;color:#666;padding:8px 12px;background:#f5f5f0;border-radius:8px;margin-bottom:1rem;line-height:1.5;}
table{width:100%;border-collapse:collapse;font-size:14px;}
th{text-align:left;font-size:12px;font-weight:500;color:#888;padding:8px;border-bottom:1px solid #e8e5dc;}
td{padding:9px 8px;border-bottom:1px solid #f0ede4;}
tr:last-child td{border-bottom:none;}
.medal-1{color:#ba7517;font-weight:600;}
